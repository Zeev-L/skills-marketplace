<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>zeev-playground · skill catalog</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c232c; --border: #2b333d;
    --fg: #e6edf3; --muted: #9aa7b4; --accent: #6ea8fe; --accent-fg: #08111f;
    --chip: #21262d; --code: #0b0f14; --ok: #3fb950;
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.25);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f6f8fa; --panel:#fff; --panel2:#f0f3f6; --border:#d8dee4;
      --fg:#1f2328; --muted:#59636e; --accent:#0969da; --accent-fg:#fff;
      --chip:#eaeef2; --code:#f6f8fa; --ok:#1a7f37;
      --shadow:0 1px 3px rgba(31,35,40,.12), 0 8px 24px rgba(31,35,40,.08);
    }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  a { color:var(--accent); }
  .wrap { max-width:1040px; margin:0 auto; padding:0 20px 64px; }
  header.hero { padding:40px 0 16px; }
  h1 { margin:0 0 6px; font-size:28px; letter-spacing:-.02em; }
  .sub { color:var(--muted); margin:0; }
  .sub code { background:var(--code); padding:2px 6px; border-radius:6px; font-size:.85em; }
  .toolbar { position:sticky; top:0; z-index:5; background:var(--bg);
    padding:14px 0; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .search { width:100%; padding:12px 14px; font-size:15px; color:var(--fg);
    background:var(--panel); border:1px solid var(--border); border-radius:10px; outline:none; }
  .search:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .chip { cursor:pointer; user-select:none; padding:6px 12px; border-radius:999px;
    background:var(--chip); border:1px solid var(--border); color:var(--fg); font-size:13px; }
  .chip[aria-pressed="true"] { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); font-weight:600; }
  .chip .n { opacity:.65; font-variant-numeric:tabular-nums; }
  .count { color:var(--muted); font-size:13px; margin:0 0 14px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; margin-bottom:12px; box-shadow:var(--shadow); }
  .card h3 { margin:0 0 2px; font-size:16px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .by { font-size:12.5px; color:var(--muted); margin:0 0 10px; }
  .by a { color:var(--muted); text-decoration:none; border-bottom:1px dotted var(--border); }
  .by a:hover { color:var(--accent); border-bottom-color:var(--accent); }
  .card p { margin:0 0 12px; color:var(--fg); }
  .meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  .badge { font-size:12px; padding:3px 9px; border-radius:999px; background:var(--panel2);
    border:1px solid var(--border); color:var(--muted); }
  .badge.role { color:var(--fg); }
  .badge.ok { color:var(--ok); border-color:color-mix(in srgb,var(--ok) 45%,var(--border)); }
  .badge.warn { color:#d29922; border-color:#d29922; }
  @media (prefers-color-scheme: light) { .badge.warn { color:#9a6700; border-color:#d4a72c; } }
  .setup-note { margin-top:10px; padding:10px 12px; border-radius:8px; font-size:13px;
    background:color-mix(in srgb,#d29922 12%,transparent); border:1px solid color-mix(in srgb,#d29922 40%,var(--border)); }
  .setup-note .lead { color:var(--fg); margin:0 0 8px; }
  .install { display:flex; align-items:stretch; gap:8px; }
  .install code { flex:1; background:var(--code); border:1px solid var(--border); border-radius:8px;
    padding:9px 12px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px;
    overflow-x:auto; white-space:nowrap; }
  .copy { cursor:pointer; border:1px solid var(--border); background:var(--panel2); color:var(--fg);
    border-radius:8px; padding:0 14px; font-size:13px; font-weight:600; white-space:nowrap; }
  .copy:hover { border-color:var(--accent); }
  .copy.done { color:var(--accent-fg); background:var(--ok); border-color:var(--ok); }
  .empty { color:var(--muted); text-align:center; padding:48px 0; }
  footer { color:var(--muted); font-size:13px; margin-top:32px; text-align:center; }
  mark { background:color-mix(in srgb,var(--accent) 45%,transparent); color:inherit; border-radius:3px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>zeev-playground · skill catalog</h1>
    <p class="sub" id="subtitle">Loading…</p>
    <p class="sub" style="margin-top:8px">Add the marketplace: <code>claude plugin marketplace add Zeev-L/playground</code></p>
  </header>

  <div class="toolbar">
    <input id="search" class="search" type="search" placeholder="Search skills, descriptions, plugins…" autocomplete="off" />
    <div id="chips" class="chips"></div>
  </div>

  <p id="count" class="count"></p>
  <div id="results"></div>

  <footer>
    Data-driven from <a href="./skills.json">skills.json</a> · generated by
    <a href="https://github.com/Zeev-L/playground/blob/main/scripts/generate-catalog.py">generate-catalog.py</a>
    · <a href="https://github.com/Zeev-L/playground">repo</a>
  </footer>
</div>

<script>
const state = { data: null, role: "All", q: "" };
const $ = (s) => document.querySelector(s);
const esc = (s) => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function highlight(text, q) {
  const e = esc(text);
  if (!q) return e;
  try {
    const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
    return e.replace(re, "<mark>$1</mark>");
  } catch { return e; }
}

function render() {
  const { data, role, q } = state;
  const ql = q.trim().toLowerCase();
  const rows = data.skills.filter(s => {
    if (role !== "All" && s.role !== role) return false;
    if (!ql) return true;
    return (s.skill + " " + s.description + " " + s.plugin + " " + s.author).toLowerCase().includes(ql);
  });
  $("#count").textContent = `${rows.length} skill${rows.length === 1 ? "" : "s"}` +
    (role === "All" ? "" : ` · ${role}`) + (ql ? ` · “${q}”` : "");
  if (!rows.length) { $("#results").innerHTML = `<div class="empty">No skills match.</div>`; return; }
  $("#results").innerHTML = rows.map(s => `
    <div class="card">
      <h3>${highlight(s.skill, q)}</h3>
      <p class="by">by ${highlight(s.author, q)} · <a href="${esc(s.source_url)}" target="_blank" rel="noopener">${esc(s.source_repo)}</a></p>
      <p>${s.description ? highlight(s.description, q) : "<span style='color:var(--muted)'>No description.</span>"}</p>
      <div class="meta">
        <span class="badge">plugin: ${highlight(s.plugin, q)}</span>
        <span class="badge role">${esc(s.role)}</span>
        ${s.setup === "https"
          ? `<span class="badge warn">⚠ one-time setup</span>`
          : `<span class="badge ok">✓ zero setup</span>`}
      </div>
      <div class="install">
        <code>${esc(s.install)}</code>
        <button class="copy" data-cmd="${esc(s.install)}">Copy</button>
      </div>
      ${s.setup === "https" ? `
      <div class="setup-note">
        <p class="lead">⚠ Whole-repo plugin — cloned over SSH. On a machine without a GitHub SSH key, run this <strong>once</strong> first:</p>
        <div class="install">
          <code>${esc(state.data.https_setup_cmd)}</code>
          <button class="copy" data-cmd="${esc(state.data.https_setup_cmd)}">Copy</button>
        </div>
      </div>` : ""}
    </div>`).join("");
}

function renderChips() {
  const { data } = state;
  const counts = {};
  data.skills.forEach(s => counts[s.role] = (counts[s.role] || 0) + 1);
  const roles = ["All", ...data.roles];
  $("#chips").innerHTML = roles.map(r => {
    const n = r === "All" ? data.skills.length : (counts[r] || 0);
    return `<button class="chip" data-role="${esc(r)}" aria-pressed="${r === state.role}">${esc(r)} <span class="n">${n}</span></button>`;
  }).join("");
}

document.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (chip) { state.role = chip.dataset.role; renderChips(); render(); return; }
  const btn = e.target.closest(".copy");
  if (btn) {
    navigator.clipboard.writeText(btn.dataset.cmd).then(() => {
      const t = btn.textContent; btn.textContent = "Copied!"; btn.classList.add("done");
      setTimeout(() => { btn.textContent = t; btn.classList.remove("done"); }, 1400);
    });
  }
});
$("#search").addEventListener("input", (e) => { state.q = e.target.value; render(); });

fetch("./skills.json").then(r => r.json()).then(d => {
  state.data = d;
  $("#subtitle").innerHTML = `<strong>${d.total_skills}</strong> skills across <strong>${d.total_plugins}</strong> plugins` +
    (d.generated_at ? ` · updated ${esc(d.generated_at.slice(0,10))}` : "");
  renderChips(); render();
}).catch(err => {
  $("#subtitle").textContent = "Failed to load skills.json";
  $("#results").innerHTML = `<div class="empty">Could not load catalog data: ${esc(String(err))}</div>`;
});
</script>
</body>
</html>
